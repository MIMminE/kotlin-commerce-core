name: CI - Service Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, inventory-service, payment-service, product-service]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Make Gradle wrapper executable
        run: chmod +x ${{ matrix.service }}/gradlew

      - name: Run tests for service
        working-directory: ${{ matrix.service }}
        continue-on-error: true
        run: |
          echo "Running tests for ${{ matrix.service }}"
          ./gradlew test --no-daemon --stacktrace || true
          echo $? > ../test_exit_code_${{ matrix.service }}

      - name: Collect and print failing test summaries
        if: always()
        working-directory: ${{ matrix.service }}
        run: |
          echo "Collecting test reports for ${{ matrix.service }}"
          echo "-- Test reports (plain files) --"
          if [ -d build/test-results ]; then
            find build/test-results -type f -name '*.xml' -or -name '*.txt' -print -exec sed -n '1,200p' {} \; || true
          fi
          echo "-- Human-readable reports (if any) --"
          if [ -d build/reports/tests/test ]; then
            find build/reports/tests/test -type f -maxdepth 1 -print -exec sed -n '1,200p' {} \; || true
          fi

      - name: Upload test results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/build/test-results
            ${{ matrix.service }}/build/reports

      - name: Fail workflow if tests failed
        if: always()
        run: |
          CODE_FILE=../test_exit_code_${{ matrix.service }}
          if [ -f "$CODE_FILE" ]; then
            code=$(cat "$CODE_FILE" | tr -d '\r' )
            echo "Test exit code: $code"
            if [ "$code" != "0" ]; then
              echo "Tests failed for ${{ matrix.service }} (exit $code). Failing job.";
              exit $code
            fi
          else
            echo "No exit code file found; assuming tests passed."
          fi
