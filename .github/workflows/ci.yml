name: CI - Service Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, inventory-service, payment-service, product-service]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Make Gradle wrapper executable
        run: chmod +x ${{ matrix.service }}/gradlew

      - name: Run tests for service
        working-directory: ${{ matrix.service }}
        run: |
          echo "Running tests for ${{ matrix.service }}"
          ./gradlew test --no-daemon --stacktrace

      - name: Upload test results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/build/test-results
            ${{ matrix.service }}/build/reports
