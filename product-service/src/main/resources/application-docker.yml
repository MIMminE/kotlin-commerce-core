spring:
  data:
    redis:
      host: redis
      port: 6379
      timeout: 60000
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      acks: all
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
    consumer:
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "nuts.commerce.productservice.event"
        spring.json.value.default.type: "nuts.commerce.productservice.event.inbound.ProductInboundEvent"
        spring.json.use.type.headers: false
  datasource:
    url: jdbc:postgresql://product-postgres:5432/product_db
    username: app
    password: app_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      encoding: UTF-8
      data-locations: classpath:/data.sql
server:
  port: 8080
system:
  product-event-listener:
    enabled: true
    topic: product-event
    group-id: product-service-group
