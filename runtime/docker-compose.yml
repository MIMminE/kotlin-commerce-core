services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]

  order-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5433:5432"
    volumes:
      - order-pgdata:/var/lib/postgresql/data

  inventory-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5434:5432"
    volumes:
      - inventory-pgdata:/var/lib/postgresql/data

  payment-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5435:5432"
    volumes:
      - payment-pgdata:/var/lib/postgresql/data

  product-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5436:5432"
    volumes:
      - product-pgdata:/var/lib/postgresql/data

  order-service:
    build: ../order-service
    depends_on:
      - kafka
      - order-postgres
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8083:8083"

  inventory-service:
    build: ../inventory-service
    depends_on:
      - kafka
      - inventory-postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8081"

  payment-service:
    build: ../payment-service
    depends_on:
      - kafka
      - payment-postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8082:8082"

  product-service:
    build: ../product-service
    depends_on:
      - kafka
      - product-postgres
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"

volumes:
  order-pgdata:
  inventory-pgdata:
  payment-pgdata:
  product-pgdata:

networks:
  default:
    name: kotlin-commerce-runtime-net
