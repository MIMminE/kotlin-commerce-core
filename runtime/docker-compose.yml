services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  order-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5433:5432"
    volumes:
      - order-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5434:5432"
    volumes:
      - inventory-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5435:5432"
    volumes:
      - payment-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  product-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5436:5432"
    volumes:
      - product-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  order-service:
    build: ../order-service
    depends_on:
      kafka:
        condition: service_healthy
      order-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  inventory-service:
    build: ../inventory-service
    depends_on:
      kafka:
        condition: service_healthy
      inventory-postgres:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  payment-service:
    build: ../payment-service
    depends_on:
      kafka:
        condition: service_healthy
      payment-postgres:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  product-service:
    build: ../product-service
    depends_on:
      kafka:
        condition: service_healthy
      product-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

volumes:
  order-pgdata:
  inventory-pgdata:
  payment-pgdata:
  product-pgdata:

networks:
  default:
    name: kotlin-commerce-runtime-net
