spring:
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "nuts.commerce.inventoryservice.event"
  datasource:
    url: jdbc:postgresql://inventory-postgres:5432/inventory_db
    username: app
    password: app_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      encoding: UTF-8
      data-locations: classpath:/data.sql
server:
  port: 8081
system:
  outbox-publisher:
    enabled: true
    fixed-delay: 5000
    claim-batch-size: 50
    claim-locked-by: nuts-worker

